<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Правовой альянс — юридический помощник</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --ink:#0F2A43; --ink2:#1A3D5C; --paper:#F3F1EA; --surface:#fff;
    --line:#E6E1D4; --gold:#B68A33; --goldsoft:#F3E8CC; --text:#14202C;
    --muted:#5C6A78; --ok:#2E7D5B; --err:#B23B3B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .app{display:flex;flex-direction:column;height:100vh;max-width:560px;margin:0 auto;background:var(--surface)}
  /* Header */
  .header{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 16px;background:linear-gradient(135deg,var(--ink),var(--ink2))}
  .logo{background:#fff;border-radius:10px;padding:6px 9px;display:flex;align-items:center;max-width:100%}
  .logo img{max-height:54px;max-width:100%;height:auto;width:auto;display:block}
  .htag{font-size:11px;color:#C7D2DD;text-align:center}
  /* Contact strip */
  .strip{display:flex;flex-direction:column;gap:4px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--line)}
  .clabel{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:3px 0 2px}
  .crow{display:flex;gap:6px}
  .crow a{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 4px;border-radius:8px;border:1px solid var(--line);text-decoration:none;color:var(--ink);font-size:11.5px;font-weight:600;cursor:pointer}
  .crow a svg{width:13px;height:13px;color:var(--gold)}
  .site{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;margin-top:4px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
  .site svg{width:12px;height:12px;color:var(--gold)}
  /* Chat */
  .chat{flex:1;overflow-y:auto;padding:18px 16px;background:var(--paper)}
  .chat::-webkit-scrollbar{width:8px}.chat::-webkit-scrollbar-thumb{background:#d8d3c6;border-radius:8px}
  .row{display:flex;margin-bottom:10px;animation:fadein .25s ease both}
  .row.user{justify-content:flex-end}
  .bubble{max-width:85%;padding:10px 13px;border-radius:14px;font-size:14.5px;line-height:1.5}
  .bubble.bot{background:var(--surface);color:var(--text);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble.user{background:var(--ink);color:#fff;border-bottom-right-radius:4px}
  .wide{max-width:94%;width:94%}
  .typing{display:inline-flex;gap:5px;padding:12px 14px;border-radius:14px;background:var(--surface);border:1px solid var(--line)}
  .dot{width:7px;height:7px;border-radius:99px;background:var(--muted);animation:blink 1.2s infinite both}
  /* Assessment card */
  .assess{background:var(--surface);border:1px solid var(--line);border-radius:14px;border-top-left-radius:4px;padding:16px}
  .assess .hd{display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .assess .seal{width:26px;height:26px;border-radius:7px;background:var(--goldsoft);display:flex;align-items:center;justify-content:center}
  .assess .seal svg{width:15px;height:15px;color:var(--gold)}
  .assess .ti{font-weight:700;font-size:14px;color:var(--ink)}
  .assess .ai{margin-left:auto;font-size:10px;font-weight:700;color:var(--ink);background:var(--goldsoft);padding:2px 7px;border-radius:5px}
  .assess p{margin:12px 0 0;font-size:14px;line-height:1.55}
  .sect{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}
  .norm{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin-bottom:8px}
  .nchip{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;font-weight:600;color:var(--gold);background:var(--goldsoft);border:1px solid #B68A3340;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .nnote{font-size:13px;color:var(--muted);line-height:1.45;flex:1;min-width:160px}
  .li{display:flex;gap:8px;margin-bottom:5px;font-size:13.5px;line-height:1.45}
  .li svg{width:15px;height:15px;flex-shrink:0;margin-top:2px}
  .disc{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);line-height:1.45}
  /* Lead card */
  .leadcard{background:var(--ink);border-radius:14px;border-top-left-radius:4px;padding:16px;color:#fff}
  .leadcard .hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .leadcard .ck{width:24px;height:24px;border-radius:99px;background:var(--gold);display:flex;align-items:center;justify-content:center}
  .leadcard .ck svg{width:15px;height:15px;color:var(--ink)}
  .leadcard .hd .ti{font-weight:700;font-size:14px}
  .fld{display:flex;gap:10px;font-size:13px;padding:3px 0}
  .fld .k{color:#9aa9b8;min-width:96px}.fld .v{font-weight:500}
  .deliv{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.14)}
  .srow{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 0}
  .srow .lbl{color:#cdd6e0;min-width:64px}.srow .tgt{color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srow .st{font-weight:600;white-space:nowrap}
  .fbk{display:flex;gap:8px;margin-top:8px}
  .fbk a{flex:1;text-align:center;padding:8px;border-radius:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;font-size:12.5px;font-weight:600;cursor:pointer}
  /* Controls */
  .controls{border-top:1px solid var(--line);background:var(--surface);padding:12px}
  .cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .cat{display:flex;align-items:center;gap:8px;flex:1 1 calc(50% - 8px);min-width:150px;padding:10px 12px;border-radius:11px;border:1px solid var(--line);background:var(--surface);cursor:pointer;text-align:left;color:var(--ink);font-size:13px;font-weight:500}
  .cat:hover{border-color:var(--gold)}
  .cat svg{width:16px;height:16px;color:var(--gold);flex-shrink:0}
  .calc-entry{display:flex;align-items:center;gap:8px;width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--gold);background:var(--goldsoft);color:var(--ink);font-weight:600;font-size:13.5px;cursor:pointer;margin-bottom:10px}
  .calc-entry svg{width:17px;height:17px;color:var(--gold);flex-shrink:0}
  .form{display:flex;flex-direction:column;gap:9px;margin-bottom:10px}
  .fl{display:flex;flex-direction:column;gap:4px}
  .fl label{font-size:12px;font-weight:600;color:var(--muted)}
  .fl select,.fl input{padding:10px 11px;border-radius:10px;border:1px solid var(--line);font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;width:100%}
  .fl select:focus,.fl input:focus{border-color:var(--gold)}
  .calc-actions{display:flex;gap:8px}
  .quick{display:flex;gap:8px;margin-bottom:10px}
  .qbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border-radius:11px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid}
  .qbtn svg{width:16px;height:16px;flex-shrink:0}
  .qbook{background:var(--ink);color:#fff;border-color:var(--ink)}
  .qbook svg{color:var(--gold)}
  .qcalc{background:var(--goldsoft);color:var(--ink);border-color:var(--gold)}
  .qcalc svg{color:var(--gold)}
  .btns{display:flex;gap:8px}
  .cta{flex:1;padding:12px;border-radius:11px;border:none;background:var(--ink);color:#fff;font-weight:600;font-size:14px;cursor:pointer}
  .cta:hover{background:var(--ink2)}
  .cta2{padding:12px 16px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:600;font-size:14px;cursor:pointer}
  .full{width:100%}
  .inrow{display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;max-height:120px;padding:11px 13px;border-radius:11px;border:1px solid var(--line);font-size:14px;font-family:inherit;color:var(--text);outline:none;line-height:1.4}
  textarea:focus{border-color:var(--gold)}
  textarea:disabled{background:var(--paper)}
  .send{width:44px;height:44px;border-radius:11px;border:none;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .send:disabled{background:#C7CCD8;cursor:default}
  .send svg{width:18px;height:18px}
  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.row,.dot{animation:none}}
</style>

/* ============ Мини-хелпер для DOM ============ */
function el(tag, attrs, ...kids){
  const e=document.createElement(tag); attrs=attrs||{};
  for(const k in attrs){
    if(k==="style") Object.assign(e.style,attrs[k]);
    else if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  for(const kid of kids){ if(kid==null) continue; e.append(kid.nodeType?kid:document.createTextNode(kid)); }
  return e;
}

/* ============ Запрос оценки к бэкенду ============ */
function normalize(p){
  const arr=v=>Array.isArray(v)?v.filter(Boolean):[];
  return {
    summary: typeof p.summary==="string"?p.summary:"",
    norms: arr(p.norms).map(n=> typeof n==="string"?{ref:"",note:n}:{ref:n.ref||"",note:n.note||""}),
    actions: arr(p.actions).map(String),
    documents: arr(p.documents).map(String),
    note: typeof p.note==="string"?p.note:"",
  };
}
async function getAssessment(category, description){
  try{
    const res=await fetch("/api/assess",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({category,description})});
    if(!res.ok) return {ok:false};
    const data=await res.json();
    const text=(data.text||"").trim();
    const clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();
    try{ return {ok:true,data:normalize(JSON.parse(clean))}; }
    catch{ return {ok:true,data:{summary:text,norms:[],actions:[],documents:[],note:""}}; }
  }catch{ return {ok:false}; }
}
async function runAssessment(label, description){
  setControls("assessing");
  const t=addTyping();
  const r=await getAssessment(label,description);
  t.remove();
  if(!r.ok){
    botText("Не удалось сформировать предварительную оценку — но это не страшно. Оставьте контакт, и юрист разберёт вашу ситуацию лично.");
    setControls("postAssess"); return;
  }
  pending.category=label; pending.description=description; pending.assessment=r.data;
  assessmentCard(r.data);
  botText("Хотите детальный разбор по вашим документам? Оставьте контакт — юрист «Альянса» свяжется с вами.");
  setControls("postAssess");
}

function inputRow(placeholder, prefill, enabled){
  const ta=el("textarea",{rows:"1",placeholder:placeholder, onkeydown:(e)=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault(); onSend();} }});
  if(prefill) ta.value=prefill;

  const update=()=>{ btn.disabled = !enabled || !ta.value.trim(); };
  ta.addEventListener("input",update); update();
  setTimeout(()=>{ if(enabled) ta.focus(); },50);
  return el("div",{class:"inrow"}, ta, btn);
}
function fmt(n){ return Math.round(n).toLocaleString("ru-RU")+" ₽"; }
function gpImushch(x){
  if(x<=100000) return 4000;
  if(x<=300000) return 4000 + 0.03*(x-100000);
  if(x<=500000) return 10000 + 0.025*(x-300000);
  if(x<=1000000) return 15000 + 0.02*(x-500000);
  if(x<=3000000) return 25000 + 0.01*(x-1000000);
  if(x<=8000000) return 45000 + 0.007*(x-3000000);
  if(x<=24000000) return 80000 + 0.0035*(x-8000000);
  if(x<=50000000) return 136000 + 0.003*(x-24000000);
  if(x<=100000000) return 214000 + 0.002*(x-50000000);
  return Math.min(314000 + 0.0015*(x-100000000), 900000);
}

function computeGosp(){
  const type=document.getElementById("gp-type").value;
  let gp=0, line="", extra="";
  if(type==="imushch"||type==="prikaz"){
    const x=parseFloat((document.getElementById("gp-sum").value||"").replace(/\s/g,"").replace(",","."));
    if(!x||x<=0){ botText("Укажите цену иска числом больше нуля."); return; }
    const base=gpImushch(x);
    gp = type==="prikaz" ? Math.round(base*0.5) : Math.round(base);
    line = (type==="prikaz"?"Судебный приказ":"Имущественный иск")+", цена иска "+fmt(x);
    extra = (type==="prikaz"?"50% от госпошлины по иску · ":"")+gpSoyFormula(x);
  } else if(type==="neimushch"){
    const who=document.getElementById("gp-istec").value;
    gp = who==="org"?20000:3000;
    line = "Неимущественный иск, "+(who==="org"?"организация":"физлицо");
    extra = "Фиксированная ставка";
  } else { gp=5000; line="Расторжение брака"; extra="Фиксированная ставка"; }
  pending.description = line+" → госпошлина ≈ "+fmt(gp);
  calcCard("Госпошлина — расчёт", line, "≈ "+fmt(gp), "ст. 333.19 НК РФ",
    "Ориентировочно, для судов общей юрисдикции и мировых судей. Сумма округлена до рубля. Возможны льготы (ст. 333.36 НК РФ); по искам о взыскании алиментов истец госпошлину не платит. Для арбитражных судов ставки иные (ст. 333.21 НК РФ).", extra);
}
function computeAlim(){

  const k=document.getElementById("al-kids").value;
  const share = k==="1"?0.25 : k==="2"?(1/3) : 0.5;

}
function gpArb(x){
  if(x<=100000) return 10000;
  if(x<=1000000) return 10000 + 0.05*(x-100000);
  if(x<=10000000) return 55000 + 0.03*(x-1000000);
  if(x<=50000000) return 325000 + 0.01*(x-10000000);
  return Math.min(725000 + 0.005*(x-50000000), 10000000);
}
function computeArb(){

}
function computeBankr(){
  const debt=parseFloat((document.getElementById("bk-debt").value||"").replace(/\s/g,"").replace(",","."));
  if(!debt||debt<=0){ botText("Укажите сумму долга числом больше нуля."); return; }
  const overdue=document.getElementById("bk-overdue").value==="yes";
  const ip=document.getElementById("bk-ip").value;
  const priv=document.getElementById("bk-priv").value==="yes";
  const mfcRange = debt>=25000 && debt<=1000000;
  let route, detail, ref;
  if(mfcRange && (ip==="closed" || priv)){
    route="Внесудебное (через МФЦ), бесплатно";
    detail=(priv && ip!=="closed")
      ? "Вы в льготной категории (пенсионер, пособия на детей или участник СВО) — внесудебное банкротство доступно даже при открытом исполнительном производстве, при соблюдении сроков."
      : "Долг в пределах 25 000–1 000 000 ₽, исполнительное производство закрыто из-за отсутствия имущества — это основной путь для МФЦ. Процедура бесплатная и длится около 6 месяцев.";
    ref="ст. 223.2 ФЗ «О банкротстве»";
  } else if(debt>=500000){
    route="Судебное (арбитражный суд)";
    detail="При долге от 500 000 ₽ и просрочке свыше 3 месяцев гражданин обязан подать заявление. Процедура платная (финансовый управляющий и расходы), но списывает почти любые долги."+(overdue?"":" Уточните срок просрочки.");
    ref="ст. 213.4 ФЗ «О банкротстве»";
  } else if(debt>1000000){
    route="Судебное (арбитражный суд)";
    detail="Долг свыше 1 000 000 ₽ — бесплатный путь через МФЦ недоступен, банкротство проходит через суд.";
    ref="ст. 213.4 ФЗ «О банкротстве»";
  } else if(mfcRange){
    route="Судебное или дождаться закрытия ИП";
    detail="Сумма подходит для МФЦ, но для бесплатного пути нужно закрытое исполнительное производство «нет имущества» либо льготный статус. Иначе остаётся судебный путь.";
    ref="ст. 223.2 / 213.4 ФЗ «О банкротстве»";
  } else {
    route="Банкротство, скорее всего, не требуется";
    detail="Долг меньше 25 000 ₽ — для внесудебного банкротства недостаточно, а судебное при такой сумме обычно нецелесообразно. Возможны другие решения: переговоры с кредиторами, реструктуризация.";
    ref="ст. 223.2 ФЗ «О банкротстве»";
  }
  pending.description="Банкротство: долг "+fmt(debt)+", просрочка 3+ мес: "+(overdue?"да":"нет")+", ИП: "+(ip==="closed"?"закрыто":ip==="open"?"открыто":"не знаю")+", льгота: "+(priv?"да":"нет")+" -> "+route;
  calcCard("Банкротство — предварительная проверка", "Вероятный вариант:", route, ref,
    detail+" Это ориентир, а не юридическое заключение: итог зависит от состава долгов, имущества и сделок за последние 3 года. Перед подачей стоит проконсультироваться с юристом.");
}
function gpSoyFormula(x){
  if(x<=100000) return "Фиксированно: 4 000 ₽";
  if(x<=300000) return "4 000 ₽ + 3% от суммы свыше 100 000 ₽";
  if(x<=500000) return "10 000 ₽ + 2,5% от суммы свыше 300 000 ₽";
  if(x<=1000000) return "15 000 ₽ + 2% от суммы свыше 500 000 ₽";
  if(x<=3000000) return "25 000 ₽ + 1% от суммы свыше 1 000 000 ₽";
  if(x<=8000000) return "45 000 ₽ + 0,7% от суммы свыше 3 000 000 ₽";
  if(x<=24000000) return "80 000 ₽ + 0,35% от суммы свыше 8 000 000 ₽";
  if(x<=50000000) return "136 000 ₽ + 0,3% от суммы свыше 24 000 000 ₽";
  if(x<=100000000) return "214 000 ₽ + 0,2% от суммы свыше 50 000 000 ₽";
  return "314 000 ₽ + 0,15% свыше 100 000 000 ₽ (не более 900 000 ₽)";
}
function gpArbFormula(x){
  if(x<=100000) return "Фиксированно: 10 000 ₽";
  if(x<=1000000) return "10 000 ₽ + 5% от суммы свыше 100 000 ₽";
  if(x<=10000000) return "55 000 ₽ + 3% от суммы свыше 1 000 000 ₽";
  if(x<=50000000) return "325 000 ₽ + 1% от суммы свыше 10 000 000 ₽";

}

    const sumWrap=el("div",{class:"fl",id:"gp-sum-wrap"}, el("label",{},"Цена иска, ₽"), el("input",{type:"number",id:"gp-sum",inputmode:"numeric",placeholder:"Например, 350000"}));
    const istecSel=el("select",{id:"gp-istec"}, el("option",{value:"fiz"},"Физическое лицо"), el("option",{value:"org"},"Организация"));
    const istecWrap=el("div",{class:"fl",id:"gp-istec-wrap",style:{display:"none"}}, el("label",{},"Кто подаёт"), istecSel);
    form.append(el("div",{class:"fl"}, el("label",{},"Тип обращения"), typeSel), sumWrap, istecWrap);
    const sync=()=>{ const v=typeSel.value; sumWrap.style.display=(v==="imushch"||v==="prikaz")?"flex":"none"; istecWrap.style.display=(v==="neimushch")?"flex":"none"; };
    typeSel.addEventListener("change",sync); sync();
    const go=el("button",{class:"cta full",onclick:()=>computeGosp()},"Рассчитать");
    const sec=el("div",{class:"calc-actions"},
      el("button",{class:"cta",onclick:()=>{ botText("Как вас зовут?"); setControls("contactName"); }},"Оставить контакт"),
      el("button",{class:"cta2",onclick:()=>setControls("calcMenu")},"Назад"));
    controls.append(form, go, el("div",{style:{height:"8px"}}), sec);
  }else if(s==="calcAlim"){
    const form=el("div",{class:"form"});
    form.append(el("div",{class:"fl"}, el("label",{},"Ежемесячный доход плательщика (после налогов), ₽"), el("input",{type:"number",id:"al-income",inputmode:"numeric",placeholder:"Например, 80000"})));
    const kids=el("select",{id:"al-kids"}, el("option",{value:"1"},"1 ребёнок"), el("option",{value:"2"},"2 детей"), el("option",{value:"3"},"3 и более"));
    form.append(el("div",{class:"fl"}, el("label",{},"Количество детей"), kids));
    const go=el("button",{class:"cta full",onclick:()=>computeAlim()},"Рассчитать");
    const sec=el("div",{class:"calc-actions"},
      el("button",{class:"cta",onclick:()=>{ botText("Как вас зовут?"); setControls("contactName"); }},"Оставить контакт"),
      el("button",{class:"cta2",onclick:()=>setControls("calcMenu")},"Назад"));
    controls.append(form, go, el("div",{style:{height:"8px"}}), sec);
  }else if(s==="calcArb"){
    const form=el("div",{class:"form"});
    const typeSel=el("select",{id:"ab-type"},
      el("option",{value:"imushch"},"Имущественный иск (есть цена иска)"),
      el("option",{value:"prikaz"},"Судебный приказ"),
      el("option",{value:"neimushch"},"Неимущественный иск"));
    const sumWrap=el("div",{class:"fl",id:"ab-sum-wrap"}, el("label",{},"Цена иска, ₽"), el("input",{type:"number",id:"ab-sum",inputmode:"numeric",placeholder:"Например, 1500000"}));
    const istecSel=el("select",{id:"ab-istec"}, el("option",{value:"org"},"Организация"), el("option",{value:"fiz"},"Физлицо / ИП"));
    const istecWrap=el("div",{class:"fl",id:"ab-istec-wrap",style:{display:"none"}}, el("label",{},"Кто подаёт"), istecSel);
    form.append(el("div",{class:"fl"}, el("label",{},"Тип обращения"), typeSel), sumWrap, istecWrap);
    const sync=()=>{ const v=typeSel.value; sumWrap.style.display=(v==="imushch"||v==="prikaz")?"flex":"none"; istecWrap.style.display=(v==="neimushch")?"flex":"none"; };
    typeSel.addEventListener("change",sync); sync();
    const go=el("button",{class:"cta full",onclick:()=>computeArb()},"Рассчитать");
    const sec=el("div",{class:"calc-actions"},
      el("button",{class:"cta",onclick:()=>{ botText("Как вас зовут?"); setControls("contactName"); }},"Оставить контакт"),
      el("button",{class:"cta2",onclick:()=>setControls("calcMenu")},"Назад"));
    controls.append(form, go, el("div",{style:{height:"8px"}}), sec);
  }else if(s==="calcBankr"){
    const form=el("div",{class:"form"});
    form.append(el("div",{class:"fl"}, el("label",{},"Общая сумма долгов, ₽"), el("input",{type:"number",id:"bk-debt",inputmode:"numeric",placeholder:"Например, 600000"})));
    const ov=el("select",{id:"bk-overdue"}, el("option",{value:"yes"},"Да, больше 3 месяцев"), el("option",{value:"no"},"Нет или меньше"));
    form.append(el("div",{class:"fl"}, el("label",{},"Просрочка по платежам"), ov));
    const ipsel=el("select",{id:"bk-ip"}, el("option",{value:"closed"},"Закрыто приставами «нет имущества»"), el("option",{value:"open"},"Открыто / идёт"), el("option",{value:"unknown"},"Не знаю"));
    form.append(el("div",{class:"fl"}, el("label",{},"Исполнительное производство у приставов"), ipsel));
    const pr=el("select",{id:"bk-priv"}, el("option",{value:"no"},"Нет"), el("option",{value:"yes"},"Пенсионер / пособия на детей / СВО"));
    form.append(el("div",{class:"fl"}, el("label",{},"Особый статус"), pr));
    const go=el("button",{class:"cta full",onclick:()=>computeBankr()},"Проверить");
    const sec=el("div",{class:"calc-actions"},
      el("button",{class:"cta",onclick:()=>{ botText("Как вас зовут?"); setControls("contactName"); }},"Оставить контакт"),
      el("button",{class:"cta2",onclick:()=>setControls("calcMenu")},"Назад"));
    controls.append(form, go, el("div",{style:{height:"8px"}}), sec);
  }else if(s==="intake"){
    controls.append(inputRow("Опишите детали…","",true));
  }else if(s==="assessing"){
    controls.append(inputRow("Подождите…","",false));
  }else if(s==="postAssess"){
    const wrap=el("div",{class:"btns"});
    wrap.append(el("button",{class:"cta",onclick:()=>{ botText("Как вас зовут?"); setControls("contactName"); }},"Оставить контакт"),
                el("button",{class:"cta2",onclick:()=>{ botText("Опишите вопрос или уточните детали — обновлю оценку."); setControls("intake"); }},"Ещё вопрос"));
    controls.append(wrap);
  }else if(s==="postChecklist"){
    const wrap=el("div",{class:"btns"});
    wrap.append(el("button",{class:"cta",onclick:()=>{ botText("Как вас зовут?"); setControls("contactName"); }},"Оставить контакт"),
                el("button",{class:"cta2",onclick:()=>setControls("subs")},"К разделу"));
    controls.append(wrap);
  }else if(s==="bookTime"){
    controls.append(inputRow("Желаемые день и время (например: завтра после 18:00)","",true));
  }else if(s==="bookTopic"){
    controls.append(inputRow("Тема вопроса (или «—»)","",true));
  }else if(s==="contactName"){
    controls.append(inputRow("Ваше имя", TGUSER.name, true));
  }else if(s==="contactInfo"){
    controls.append(inputRow("Телефон, Telegram или email", TGUSER.username, true));
  }else if(s==="done"){
    controls.append(el("button",{class:"cta2 full",onclick:reset},"Новый диалог"));
  }
}
